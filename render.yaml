services:
  - type: web
    name: fintech-review-analytics-dashboard
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r dashboard/requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
